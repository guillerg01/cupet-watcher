services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cupet
      POSTGRES_PASSWORD: cupet
      POSTGRES_DB: cupet
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cupet"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cupet:cupet@db:5432/cupet?schema=public
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cupet:cupet@db:5432/cupet?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
